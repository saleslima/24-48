<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" id="themeColorMeta" />
  <meta name="description" content="Calendário premium APMPMSP para escala 24/48 das equipes A, B e C, instalável no iOS e Android." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="APMPMSP" />
  <meta name="format-detection" content="telephone=no" />
  <title>APMPMSP</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" aria-label="Calendário de escala 24 por 48">
    <section class="calendar-card" aria-label="Calendário mensal com equipes">
      <header class="calendar-topbar">
        <button class="nav-button" id="prevMonth" type="button" aria-label="Mês anterior">
          <span aria-hidden="true">‹</span>
        </button>

        <div class="month-stack">
          <div class="app-badge">
            <img src="assets/icons/logo-rota.png" alt="" aria-hidden="true" />
            <span>APMPMSP • Escala 24/48</span>
          </div>
          <h1 id="monthTitle">Calendário</h1>
          <p id="todayLabel" class="today-label">Hoje</p>
        </div>

        <button class="nav-button" id="nextMonth" type="button" aria-label="Próximo mês">
          <span aria-hidden="true">›</span>
        </button>
      </header>

      <section class="controls-panel" aria-label="Configurações de visualização">
        <div class="control-group">
          <span class="control-label">Equipes visíveis</span>
          <div class="team-picker" id="teamPicker" role="group" aria-label="Escolha uma, duas ou três equipes">
            <button class="team-toggle team-a" type="button" data-team="A" aria-pressed="true"><i></i>Equipe A</button>
            <button class="team-toggle team-b" type="button" data-team="B" aria-pressed="true"><i></i>Equipe B</button>
            <button class="team-toggle team-c" type="button" data-team="C" aria-pressed="true"><i></i>Equipe C</button>
          </div>
          <small id="teamHelp" class="control-help">Marque de 1 a 3 equipes ao mesmo tempo.</small>
        </div>

        <div class="control-group theme-group">
          <span class="control-label">Tema</span>
          <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false" aria-label="Alternar tema claro e escuro">
            <span class="theme-toggle-icon" aria-hidden="true">☾</span>
            <span id="themeToggleText">Modo escuro</span>
          </button>
        </div>
      </section>

      <div class="team-legend" aria-label="Legenda das equipes">
        <span class="legend-item team-a"><i></i>Equipe A</span>
        <span class="legend-item team-b"><i></i>Equipe B</span>
        <span class="legend-item team-c"><i></i>Equipe C</span>
      </div>

      <div class="weekday-grid" aria-hidden="true">
        <span>Dom</span>
        <span>Seg</span>
        <span>Ter</span>
        <span>Qua</span>
        <span>Qui</span>
        <span>Sex</span>
        <span>Sáb</span>
      </div>

      <div id="calendarViewport" class="calendar-viewport">
        <div id="calendarGrid" class="calendar-grid" role="grid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <aside id="installBanner" class="install-banner" aria-live="polite" hidden>
    <div class="install-icon" aria-hidden="true">
      <img src="assets/icons/logo-rota.png" alt="" />
    </div>
    <div class="install-text">
      <strong id="installTitle">Instalar calendário</strong>
      <span id="installDescription">Acesso rápido, tela cheia e funcionamento offline no iOS e Android.</span>
    </div>
    <button id="installButton" type="button">Instalar</button>
    <button id="dismissInstall" class="install-dismiss" type="button" aria-label="Fechar aviso de instalação">×</button>
  </aside>

  <script src="app.js" defer></script>
</body>
</html>
